name: Daily VOSE Movie Scraper

on:
  schedule:
    # Run every night at 01:30 AM UTC
    - cron: '30 1 * * *'
  workflow_dispatch:
    # Allow manual execution via GitHub web UI

permissions:
  contents: write # Needed to push changes back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Scraper & Compile Data
      run: |
        python scrape_and_compile.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add only the API JSON payload
        git add api/v1/showtimes.json
        
        # Commit only if there are changes
        if git diff --cached --quiet; then
          echo "No changes in showtimes.json, skipping commit."
        else
          git commit -m "auto: update VOSE showtimes database"
          git push origin main
        fi

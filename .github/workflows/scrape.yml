name: VOSE Movie Scraper (Every 3 Hours)

on:
  push:
    branches:
      - main
  schedule:
    # Run every 3 hours (at minute 0)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allow manual execution via GitHub web UI

permissions:
  contents: write # Needed to push changes back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper & Compile Data
      run: |
        python scrape_and_compile.py 2>&1 | tee scrape.log

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add both the API JSON payload and the scrape log
        git add api/v1/showtimes.json scrape.log
        if [ -f new_showtimes.json ]; then
          git add new_showtimes.json
        fi
        
        # Commit only if there are changes
        if git diff --cached --quiet; then
          echo "No changes detected, skipping commit."
        else
          git commit -m "auto: update VOSE showtimes database and logs"
          git push origin main
        fi

name: VOSE Movie Scraper (Every 3 Hours)

on:
  push:
    branches:
      - main
  schedule:
    # Run every 3 hours (at minute 0)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allow manual execution via GitHub web UI

permissions:
  contents: write # Needed to push changes back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        python -m playwright install chromium --with-deps

    - name: Install WireGuard and resolvconf
      run: |
        sudo apt-get update
        sudo apt-get install -y wireguard resolvconf

    - name: Configure Portugal WireGuard VPN
      env:
        WG_CONF_PT: ${{ secrets.SURFSHARK_WG_CONF_PT }}
      run: |
        echo "$WG_CONF_PT" | sudo tee /etc/wireguard/wg_pt.conf
        sudo chmod 600 /etc/wireguard/wg_pt.conf

    - name: Configure Spain WireGuard VPN
      env:
        WG_CONF_ES: ${{ secrets.SURFSHARK_WG_CONF_ES }}
      run: |
        echo "$WG_CONF_ES" | sudo tee /etc/wireguard/wg_es.conf
        sudo chmod 600 /etc/wireguard/wg_es.conf

    - name: Connect to Portugal VPN
      run: |
        sudo wg-quick up wg_pt
        sleep 5
        curl https://ipinfo.io/json || true

    - name: Scrape Cinesa (Portugal IP)
      run: |
        python -c "import scrape_cinesa, json; data = scrape_cinesa.scrape_cinesa(); json.dump(data, open('cinesa_temp.json', 'w', encoding='utf-8'), ensure_ascii=False, indent=2)"

    - name: Disconnect Portugal VPN
      run: |
        sudo wg-quick down wg_pt

    - name: Connect to Spain VPN
      run: |
        sudo wg-quick up wg_es
        sleep 5
        curl https://ipinfo.io/json || true

    - name: Run Scraper & Compile Data (Spain IP)
      env:
        KINEPOLIS_HEADLESS: 'false'
      run: |
        xvfb-run python scrape_and_compile.py 2>&1 | tee scrape.log

    - name: Disconnect Spain VPN
      if: always()
      run: |
        sudo wg-quick down wg_es || true

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add the API JSON payload, translations, and the scrape log
        git add api/v1/showtimes.json scrape.log
        if [ -f movie_title_translations.json ]; then
          git add movie_title_translations.json
        fi
        if [ -f new_showtimes.json ]; then
          git add new_showtimes.json
        fi
        
        # Commit only if there are changes
        if git diff --cached --quiet; then
          echo "No changes detected, skipping commit."
        else
          git commit -m "auto: update VOSE showtimes database and logs"
          git push origin main
        fi

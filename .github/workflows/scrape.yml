name: VOSE Movie Scraper (Every 3 Hours)

on:
  push:
    branches:
      - main
  schedule:
    # Run every 3 hours (at minute 0)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allow manual execution via GitHub web UI

permissions:
  contents: write # Needed to push changes back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: |
        python -m playwright install chromium --with-deps

    - name: Install WireGuard and resolvconf
      run: |
        sudo apt-get update
        sudo apt-get install -y wireguard resolvconf

    - name: Configure WireGuard
      env:
        WG_CONF: ${{ secrets.SURFSHARK_WG_CONF }}
      run: |
        echo "$WG_CONF" | sudo tee /etc/wireguard/wg0.conf
        sudo chmod 600 /etc/wireguard/wg0.conf

    - name: Start WireGuard VPN
      run: |
        sudo wg-quick up wg0
        sleep 5
        # Verify connection by checking the external IP
        curl https://ipinfo.io/json || true

    - name: Run Scraper & Compile Data
      env:
        KINEPOLIS_HEADLESS: 'false'
      run: |
        xvfb-run python scrape_and_compile.py 2>&1 | tee scrape.log

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add the API JSON payload, translations, and the scrape log
        git add api/v1/showtimes.json scrape.log
        if [ -f movie_title_translations.json ]; then
          git add movie_title_translations.json
        fi
        if [ -f new_showtimes.json ]; then
          git add new_showtimes.json
        fi
        
        # Commit only if there are changes
        if git diff --cached --quiet; then
          echo "No changes detected, skipping commit."
        else
          git commit -m "auto: update VOSE showtimes database and logs"
          git push origin main
        fi
